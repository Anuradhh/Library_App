<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>✏️ Edit Book Details</h1>

    <div class="container">
        <form method="POST">
            <input type="text" name="title" value="{{ book.title }}" placeholder="Book Title">
            <input type="text" name="author" value="{{ book.author }}" placeholder="Author">
            <button type="submit">Update</button>
            <a class="action-btn return" href="{{ url_for('index') }}">Cancel</a>
        </form>
    </div>
</body>
</html>
